name: Build Lua (Windows)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2 (MinGW)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-toolchain
            make

      - name: Build
        shell: msys2 {0}
        run: |
          set -e
          make clean
          # Force C99 and build standard Lua targets
          make -j V=1 \
            CFLAGS="-O2 -std=gnu99" \
            all
          # If your fork has additional targets, run them too (harmless if they exist)
          make -j V=1 \
            CFLAGS="-O2 -std=gnu99" \
            add || true
