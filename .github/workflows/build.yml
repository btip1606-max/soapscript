name: Build Lua (Windows)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2 (MinGW)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-toolchain
            make

      - name: Build (C99, Windows/MinGW)
        shell: msys2 {0}
        run: |
          set -e
          make clean
          make -B -j \
            CFLAGS="-O2 -std=gnu99" \
            MYLIBS="" \
            all

          echo "=== Build outputs ==="
          ls -la
          test -f lua.exe && echo "Found: lua.exe" || (echo "Missing: lua.exe"; exit 1)
          test -f liblua.a && echo "Found: liblua.a" || (echo "Missing: liblua.a"; exit 1)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: soapscript-windows
          path: |
            soapscript.exe
            soapscript.a
